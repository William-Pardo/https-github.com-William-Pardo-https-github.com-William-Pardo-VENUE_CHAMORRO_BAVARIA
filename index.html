<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walkthrough 360 — Bavaria</title>
  <link rel="stylesheet" href="pannellum/pannellum.css" />
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: Arial, Helvetica, sans-serif; background: #000; }
    #panorama { position: fixed; inset: 0; width: 100%; height: 100%; }
    .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 22px; color: #fff; background: linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,.08)); pointer-events: none; }
    .title { font-size: 22px; font-weight: 700; text-shadow: 0 2px 8px rgba(0,0,0,.55); }
    .actions { display: flex; gap: 10px; pointer-events: auto; }
    button { border: 1px solid rgba(255,255,255,.55); border-radius: 999px; color: #fff; background: rgba(255,255,255,.16); padding: 11px 18px; font-size: 15px; font-weight: 700; cursor: pointer; backdrop-filter: blur(6px); }
    button:hover { background: rgba(255,255,255,.28); }
    .help { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); z-index: 10; max-width: calc(100% - 48px); padding: 13px 22px; border-radius: 999px; color: #fff; background: rgba(0,0,0,.45); font-size: 17px; font-weight: 700; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,.25); backdrop-filter: blur(6px); }
    @media (max-width: 720px) { .topbar { padding: 10px 12px; } .title { font-size: 17px; } button { padding: 9px 12px; font-size: 13px; } .help { font-size: 14px; bottom: 14px; } }
    .pnlm-hotspot-base { transform: scale(1.25); }
    .pnlm-tooltip span { font-size: 15px; font-weight: 700; }
  </style>
</head>
<body>
  <div id="panorama"></div>
  <div class="topbar">
    <div class="title">Walkthrough 360 — Bavaria</div>
    <div class="actions">
      <button id="homeBtn" type="button">Inicio</button>
      <button id="fullBtn" type="button">Pantalla completa</button>
    </div>
  </div>
  <div class="help">Usa el mouse para mirar alrededor. Haz clic en los puntos para avanzar.</div>

  <script src="pannellum/pannellum.js"></script>
  <script>
    const viewer = pannellum.viewer('panorama', {
      default: {
        firstScene: 's01_portal',
        sceneFadeDuration: 800,
        autoLoad: true,
        yaw: 0,
        hfov: 100,
        hotSpotDebug: false
      },
      scenes: {
        s01_portal: {
          title: 'S01 Portal', type: 'equirectangular', panorama: 'Render/BAVARIA/S01_Portal_360_8K.png', yaw: 0, hfov: 100, autoLoad: true,
          hotSpots: [{ pitch: -4, yaw: 0, type: 'scene', text: 'Entrar al túnel', sceneId: 's02_tunel' }]
        },
        s02_tunel: {
          title: 'S02 Túnel', type: 'equirectangular', panorama: 'Render/BAVARIA/S02_Tunel_360_8K.png', yaw: 0, hfov: 100, autoLoad: true,
          hotSpots: [
            { pitch: -4, yaw: 0, type: 'scene', text: 'Photo Opportunities', sceneId: 's03_photo_opportunities' },
            { pitch: -4, yaw: 180, type: 'scene', text: 'Volver al Portal', sceneId: 's01_portal' }
          ]
        },
        s03_photo_opportunities: {
          title: 'S03 Photo Opportunities', type: 'equirectangular', panorama: 'Render/BAVARIA/S03_Photo_Opportunities_360_8K.png', yaw: 0, hfov: 100, autoLoad: true,
          hotSpots: [
            { pitch: -8, yaw: 25, type: 'scene', text: 'Avanzar a Plaza Central', sceneId: 's10_plaza_central' },
            { pitch: -8, yaw: -165, type: 'scene', text: 'Volver al Túnel', sceneId: 's02_tunel' }
          ]
        },
        s10_plaza_central: {
          title: 'S10 Plaza Central', type: 'equirectangular', panorama: 'Render/BAVARIA/S10_Plaza_Central_360_8K.png', yaw: 0, hfov: 100, autoLoad: true,
          hotSpots: [
            { pitch: -5, yaw: -120, type: 'scene', text: 'Atajadas', sceneId: 's04_atajadas' },
            { pitch: -4, yaw: -70, type: 'scene', text: 'Pases', sceneId: 's05_pases' },
            { pitch: -4, yaw: -25, type: 'scene', text: 'Penaltis', sceneId: 's06_penaltis' },
            { pitch: -4, yaw: 25, type: 'scene', text: 'Comida', sceneId: 's07_comida' },
            { pitch: -4, yaw: 75, type: 'scene', text: 'Zona VIP', sceneId: 's08_zona_vip' },
            { pitch: -4, yaw: 180, type: 'scene', text: 'Volver a Photo Opportunities', sceneId: 's03_photo_opportunities' }
          ]
        },
        s04_atajadas: {
          title: 'S04 Atajadas', type: 'equirectangular', panorama: 'Render/BAVARIA/S04_Atajadas_360_8K.png', yaw: 0, hfov: 100, autoLoad: true,
          hotSpots: [{ pitch: -4, yaw: 180, type: 'scene', text: 'Volver a Plaza Central', sceneId: 's10_plaza_central' }]
        },
        s05_pases: {
          title: 'S05 Pases', type: 'equirectangular', panorama: 'Render/BAVARIA/S05_Pases_360_8K.png', yaw: 0, hfov: 100, autoLoad: true,
          hotSpots: [{ pitch: -4, yaw: 180, type: 'scene', text: 'Volver a Plaza Central', sceneId: 's10_plaza_central' }]
        },
        s06_penaltis: {
          title: 'S06 Penaltis', type: 'equirectangular', panorama: 'Render/BAVARIA/S06_Penaltis_360_8K.png', yaw: 0, hfov: 100, autoLoad: true,
          hotSpots: [
            { pitch: -4, yaw: 0, type: 'scene', text: 'Ir a Tarima', sceneId: 's09_tarima' },
            { pitch: -4, yaw: 180, type: 'scene', text: 'Volver a Plaza Central', sceneId: 's10_plaza_central' }
          ]
        },
        s07_comida: {
          title: 'S07 Comida', type: 'equirectangular', panorama: 'Render/BAVARIA/S07_Comidas_360_8K.png', yaw: 0, hfov: 100, autoLoad: true,
          hotSpots: [
            { pitch: -4, yaw: 0, type: 'scene', text: 'Ir a Tarima', sceneId: 's09_tarima' },
            { pitch: -4, yaw: 180, type: 'scene', text: 'Volver a Plaza Central', sceneId: 's10_plaza_central' }
          ]
        },
        s08_zona_vip: {
          title: 'S08 Zona VIP', type: 'equirectangular', panorama: 'Render/BAVARIA/S08_Zona_VIP_360_8K.png', yaw: 0, hfov: 100, autoLoad: true,
          hotSpots: [{ pitch: -4, yaw: 180, type: 'scene', text: 'Volver a Plaza Central', sceneId: 's10_plaza_central' }]
        },
        s09_tarima: {
          title: 'S09 Tarima', type: 'equirectangular', panorama: 'Render/BAVARIA/S09_Tarima_360_8K.png', yaw: 0, hfov: 100, autoLoad: true,
          hotSpots: [{ pitch: -4, yaw: 180, type: 'scene', text: 'Volver a Plaza Central', sceneId: 's10_plaza_central' }]
        }
      }
    });

    document.getElementById('homeBtn').addEventListener('click', () => viewer.loadScene('s01_portal'));
    document.getElementById('fullBtn').addEventListener('click', () => {
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    });
  </script>
</body>
</html>
